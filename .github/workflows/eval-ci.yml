name: Eval CI Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  eval-gold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install deps
        run: |
          pip install -r requirements-runtime.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v
      - name: Run gold eval
        env:
          FABOPS_API_URL: ${{ secrets.FABOPS_API_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/run_judge.py --set gold
      - name: Enforce regression threshold
        # Fails the PR if the task-success rate drops more than 5pp below the
        # published baseline (83.3% = 15/18 from REPORT §5.1). Prevents silent
        # quality regressions from shipping to main.
        env:
          BASELINE_PCT: '83.3'
          MAX_REGRESSION_PP: '5.0'
        run: |
          python - <<'PY'
          import json, os, sys
          baseline = float(os.environ['BASELINE_PCT'])
          threshold = baseline - float(os.environ['MAX_REGRESSION_PP'])
          with open('evals/results/gold_run.json') as f:
              results = json.load(f)
          total = len(results)
          passed = sum(1 for r in results if r.get('verdict', {}).get('pass'))
          pct = 100.0 * passed / total if total else 0.0
          delta = pct - baseline
          print(f'gold-set task-success: {passed}/{total} = {pct:.1f}% (baseline {baseline:.1f}%, delta {delta:+.1f}pp, threshold {threshold:.1f}%)')
          if pct < threshold:
              print(f'::error::Regression: {pct:.1f}% fell more than {os.environ["MAX_REGRESSION_PP"]}pp below baseline {baseline:.1f}%')
              sys.exit(1)
          print('OK: within regression budget')
          PY
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
